<!DOCTYPE html>
<html>
<head>
    <title>5-D RADAR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; overflow: hidden; }
        #radar-circle { width: 300px; height: 300px; border: 2px solid #0f0; border-radius: 50%; margin: 50px auto; position: relative; background: radial-gradient(circle, #030 0%, #000 100%); }
        #sweep { position: absolute; width: 150px; height: 2px; background: #0f0; top: 150px; left: 150px; transform-origin: left; animation: scan 2s linear infinite; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .blip { position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff; }
        #controls { position: fixed; bottom: 20px; width: 100%; }
        .btn { padding: 25px; width: 80%; background: #0f0; color: #000; font-weight: bold; border: none; border-radius: 10px; font-size: 20px; -webkit-appearance: none; }
        #status { padding: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>5-D RADAR SYSTEM</h1>
    <div id="status">INITIALIZING...</div>

    <div id="radar-circle">
        <div id="sweep"></div>
        <div id="target-layer"></div>
    </div>

    <div id="controls">
        <button class="btn" onclick="dropTarget()">DROP TREASURE HERE</button>
    </div>

<script>
    var hdg = 0;
    var targets = [];

    // Simple sensor check
    window.addEventListener('deviceorientation', function(e) {
        hdg = e.webkitCompassHeading || (360 - e.alpha) || 0;
        document.getElementById('status').innerText = "BEARING: " + Math.floor(hdg) + "°";
    }, true);

    function dropTarget() {
        // Save the direction you are currently facing
        targets.push(hdg);
        alert("TARGET LOCKED AT " + Math.floor(hdg) + "°");
        render();
    }

    function render() {
        var layer = document.getElementById('target-layer');
        layer.innerHTML = '';
        for (var i = 0; i < targets.length; i++) {
            var el = document.createElement('div');
            el.className = 'blip';
            el.setAttribute('data-b', targets[i]);
            layer.appendChild(el);
        }
    }

    function loop() {
        var blips = document.getElementsByClassName('blip');
        for (var i = 0; i < blips.length; i++) {
            var b = parseFloat(blips[i].getAttribute('data-b'));
            var diff = b - hdg;
            while (diff < -180) diff += 360;
            while (diff > 180) diff -= 360;

            // Math to place on the circle
            var angle = (diff - 90) * (Math.PI / 180);
            var x = 150 + 120 * Math.cos(angle);
            var y = 150 + 120 * Math.sin(angle);

            blips[i].style.left = x + "px";
            blips[i].style.top = y + "px";
            
            // Only bright when you face it
            blips[i].style.opacity = Math.abs(diff) < 20 ? "1" : "0.3";
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
