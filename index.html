<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanco AR - 5D Legacy</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --cyan: #00ffff; }
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        #camera-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; background: #111; }
        #setup { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .btn { width: 260px; padding: 20px; margin: 10px; border: 2px solid var(--gold); background: #111; color: var(--gold); font-weight: bold; border-radius: 12px; -webkit-appearance: none; font-size: 16px; }
        #hud { position: absolute; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.8); z-index: 10; display: flex; align-items: center; justify-content: space-around; border-bottom: 2px solid var(--gold); }
        #world { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .box { position: absolute; width: 80px; height: 80px; background: gold; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 40px; pointer-events: auto; transform: translate(-50%, -50%); border-radius: 10px; box-shadow: 0 0 15px gold; }
        .box::after { content: '🎁'; }
        .spawn-zone { background: var(--cyan); padding: 15px; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; display: none; z-index: 20; -webkit-tap-highlight-color: transparent; }
        #debug { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 10px; color: #0f0; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>

<video id="camera-bg" autoplay playsinline muted></video>

<div id="setup">
    <h2 style="color:var(--gold)">5-D INTERFACE</h2>
    <button id="b1" class="btn">1. ENABLE OPTICS</button>
    <button id="b2" class="btn">2. CALIBRATE SENSORS</button>
    <button id="bStart" class="btn" style="border-color:#2ecc71; color:#2ecc71; display:none;">START MISSION</button>
</div>

<div id="hud">
    <div>UNFOUND: <span id="count" style="color:var(--cyan)">0</span></div>
    <div id="spawn-btn" class="spawn-zone" onclick="doSpawn()">+ SPAWN BOX</div>
</div>

<div id="world"></div>
<div id="debug">System Initialization...</div>

<script>
    // Global Error Trap
    window.onerror = function(m, u, l) { alert("Error: " + m + " line " + l); };

    var URL = 'https://tyxezjyjwghgajsilsbg.supabase.co';
    var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5eGV6anlqd2doZ2Fqc2lsc2JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyNjczODksImV4cCI6MjA4NDg0MzM4OX0.K1elrtEtbsQPTEQNfweLkh7FXq-Er38Oa5aYtqqV65Q';
    
    var _sb, myLat = 0, myLon = 0, myHdg = 0, treasures = [], active = false;

    // --- SETUP STEPS ---
    document.getElementById('b1').onclick = function() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(s) {
            document.getElementById('camera-bg').srcObject = s;
            document.getElementById('b1').disabled = true;
            document.getElementById('b1').innerText = "OPTICS OK";
            checkReady();
        }).catch(function(e) { alert("Camera Error: " + e); });
    };

    document.getElementById('b2').onclick = function() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission();
        }
        window.addEventListener('deviceorientation', function(e) { 
            myHdg = e.webkitCompassHeading || (360 - e.alpha) || 0; 
        }, true);
        navigator.geolocation.watchPosition(function(p) {
            myLat = p.coords.latitude; myLon = p.coords.longitude;
            document.getElementById('debug').innerText = "GPS: " + myLat.toFixed(5) + ", " + myLon.toFixed(5);
        }, null, { enableHighAccuracy: true });
        document.getElementById('b2').disabled = true;
        document.getElementById('b2').innerText = "SENSORS OK";
        checkReady();
    };

    function checkReady() {
        if(document.getElementById('b1').disabled && document.getElementById('b2').disabled) {
            document.getElementById('bStart').style.display = "block";
        }
    }

    // --- DATABASE SYNC ---
    function sync() {
        if (!_sb) _sb = supabase.createClient(URL, KEY);
        _sb.from('treasures').select('*').eq('collected', false).then(function(res) {
            if (res.error) { alert("Sync Error: " + res.error.message); return; }
            treasures = res.data || [];
            document.getElementById('count').innerText = treasures.length;
            var world = document.getElementById('world');
            world.innerHTML = '';
            treasures.forEach(function(item) {
                var el = document.createElement('div');
                el.className = 'box';
                el.dataset.lat = item.lat; el.dataset.lon = item.lon;
                el.onclick = function() { _sb.from('treasures').update({ collected: true }).eq('id', item.id).then(sync); };
                world.appendChild(el);
            });
        });
    }

    // --- GLOBAL SPAWN FUNCTION ---
    window.doSpawn = function() {
        if (myLat === 0) { alert("GPS coordinates not found yet!"); return; }
        alert("COMMAND RECEIVED: Dropping box...");
        
        if (!_sb) _sb = supabase.createClient(URL, KEY);
        _sb.from('treasures').insert([{ lat: myLat, lon: myLon, collected: false }]).then(function(res) {
            if (res.error) alert("Database Error: " + res.error.message);
            else { alert("Treasure saved to cloud!"); sync(); }
        });
    };

    document.getElementById('bStart').onclick = function() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('spawn-btn').style.display = 'block';
        active = true;
        sync();
        setInterval(sync, 5000);
        loop();
    };

    function loop() {
        if (!active) return;
        var ww = window.innerWidth, wh = window.innerHeight, fov = ww / 60;
        var worldBoxes = document.querySelectorAll('.box');
        worldBoxes.forEach(function(t) {
            var tLat = parseFloat(t.dataset.lat), tLon = parseFloat(t.dataset.lon);
            var dy = Math.sin((tLon-myLon)*Math.PI/180) * Math.cos(tLat*Math.PI/180);
            const dx = Math.cos(myLat*Math.PI/180)*Math.sin(tLat*Math.PI/180) - Math.sin(myLat*Math.PI/180)*Math.cos(tLat*Math.PI/180)*Math.cos((tLon-myLon)*Math.PI/180);
            var bearing = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
            var diff = bearing - myHdg;
            while (diff < -180) diff += 360;
            while (diff > 180) diff -= 360;
            t.style.left = (ww/2) + (diff * fov) + "px";
            t.style.top = (wh/2) + "px";
            t.style.display = Math.abs(diff) > 40 ? 'none' : 'flex';
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
