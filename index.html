<script>
    const ALL_SKINS = ['Blue', 'Red', 'Green', 'Gold', 'Rainbow'];

    function syncData() {
        const notes = parseInt(localStorage.getItem('notes_collected') || 0);
        const skinName = localStorage.getItem('active_skin_name') || "Blue";
        const bestScore = parseInt(localStorage.getItem('sanco_best') || 0);
        const soulBest = localStorage.getItem('soul_best_wave') || 0;
        const purchased = JSON.parse(localStorage.getItem('purchased_skins') || '["Blue"]');
        
        document.getElementById('p-notes').innerText = notes.toLocaleString();
        document.getElementById('p-skin').innerText = skinName.toUpperCase();
        document.getElementById('best-dist').innerText = Math.floor(bestScore / 10);
        document.getElementById('soul-best').innerText = soulBest;

        ALL_SKINS.forEach(s => {
            const tag = document.getElementById('tag-' + s);
            if (purchased.includes(s)) {
                tag.innerText = "OWNED";
                tag.style.color = "var(--accent)";
            }
        });
    }

    // ... [handleSkin, buyBundle, equip, and copyArcadeLink functions remain same] ...

    // --- UPDATED ADDITIVE CHEAT CODE ---
    let cheatBuffer = "";
    window.addEventListener('keydown', (e) => {
        cheatBuffer += e.key.toLowerCase();
        
        if (cheatBuffer.includes("sanco")) {
            // Get current notes
            let currentNotes = parseInt(localStorage.getItem('notes_collected') || 0);
            
            // ADD 9 Million instead of setting it
            let newTotal = currentNotes + 9000000;
            
            localStorage.setItem('notes_collected', newTotal);
            
            // Visual feedback
            const alertBox = document.getElementById('cheat-alert');
            alertBox.innerText = "+1,000,000 ♪ ADDED!";
            alertBox.style.display = "block";
            
            // Clear buffer so they can type it again immediately
            cheatBuffer = "";
            syncData();
            
            // Hide the message after 2 seconds
            setTimeout(() => { alertBox.style.display = "none"; }, 2000);
        }
        
        if (cheatBuffer.length > 10) cheatBuffer = cheatBuffer.substring(1);
    });

    setInterval(syncData, 1000);
    syncData();
</script>
