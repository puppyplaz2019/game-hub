<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5-D | POKEMON STYLE</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        #camera-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #setup { position: fixed; inset: 0; background: #000; z-index: 100; text-align: center; padding-top: 50px; }
        .btn { width: 80%; padding: 20px; margin: 10px; border: 2px solid #0ff; background: #111; color: #0ff; font-weight: bold; border-radius: 10px; -webkit-appearance: none; }
        #hud { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); z-index: 50; display: none; align-items: center; justify-content: space-around; border-bottom: 1px solid #0ff; }
        #world { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        .pokemon-box { position: absolute; width: 100px; height: 100px; background: gold; border: 3px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 50px; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #0ff; pointer-events: auto; }
        .pokemon-box:after { content: '🎁'; }
        #debug { position: fixed; bottom: 0; width: 100%; font-size: 11px; color: #0f0; background: rgba(0,0,0,0.5); text-align: center; z-index: 60; padding: 5px; }
    </style>
</head>
<body>

<video id="camera-bg" autoplay playsinline muted></video>

<div id="setup">
    <h1 style="color:#0ff">5-D POKÉ-BOOT</h1>
    <button class="btn" onclick="fnCam()">1. START CAMERA</button>
    <button class="btn" onclick="fnSens()">2. START GYRO</button>
    <button id="bStart" class="btn" style="display:none; border-color:#0f0; color:#0f0;" onclick="fnStart()">3. ENTER WORLD</button>
</div>

<div id="hud">
    <div>NEARBY: <span id="count">0</span></div>
    <button style="background:#0ff; border:none; padding:10px; font-weight:bold;" onclick="fnSpawn()">+ DROP HERE</button>
</div>

<div id="world"></div>
<div id="debug">Waiting...</div>

<script>
    var myHdg = 0, treasures = [], active = false;

    function fnCam() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(s) {
            document.getElementById('camera-bg').srcObject = s;
            document.getElementById('debug').innerText = "Camera Active";
            fnCheck();
        });
    }

    function fnSens() {
        if (window.DeviceOrientationEvent && DeviceOrientationEvent.requestPermission) {
            DeviceOrientationEvent.requestPermission();
        }
        window.addEventListener('deviceorientation', function(e) {
            // This is the "Compass" Pokemon Go uses
            myHdg = e.webkitCompassHeading || (360 - e.alpha) || 0;
            document.getElementById('debug').innerText = "HEADING: " + Math.floor(myHdg) + "°";
        }, true);
        fnCheck();
    }

    function fnCheck() {
        document.getElementById('bStart').style.display = "block";
    }

    function fnSpawn() {
        // Just save the direction you are facing
        treasures.push({ bearing: myHdg });
        fnUpdate();
    }

    function fnUpdate() {
        var w = document.getElementById('world');
        w.innerHTML = '';
        document.getElementById('count').innerText = treasures.length;
        
        for (var i = 0; i < treasures.length; i++) {
            var el = document.createElement('div');
            el.className = 'pokemon-box';
            el.setAttribute('data-bearing', treasures[i].bearing);
            el.onclick = function() { this.remove(); };
            w.appendChild(el);
        }
    }

    function fnStart() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        active = true;
        fnLoop();
    }

    function fnLoop() {
        if (!active) return;
        var ww = window.innerWidth;
        var wh = window.innerHeight;
        var fov = ww / 60; // Field of view
        
        var boxes = document.getElementsByClassName('pokemon-box');
        for (var i = 0; i < boxes.length; i++) {
            var t = boxes[i];
            var b = parseFloat(t.getAttribute('data-bearing'));
            
            var diff = b - myHdg;
            while (diff < -180) diff += 360;
            while (diff > 180) diff -= 360;

            // Move it horizontally based on the compass
            t.style.left = (ww/2) + (diff * fov) + "px";
            t.style.top = (wh/2) + "px";

            // Hide if it's behind you
            t.style.display = Math.abs(diff) > 30 ? 'none' : 'flex';
        }
        requestAnimationFrame(fnLoop);
    }
</script>
</body>
</html>
