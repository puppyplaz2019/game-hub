<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanco x ESOFA Arcade HUB</title>
    <style>
        :root { --accent: #00ffff; --sanco-red: #ff0000; --esofa-gold: #d4af37; --bg: #0a0a0c; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; }
        header { padding: 30px; text-align: center; border-bottom: 3px solid var(--accent); background: #000; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .profile-bar { display: flex; justify-content: space-around; background: #111; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; flex-wrap: wrap; }
        .stat { font-weight: bold; }
        .stat span { color: var(--accent); }

        .shop-box { background: #16161a; border: 2px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 30px; text-align: center; }
        .skin-list { display: flex; gap: 15px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .skin-item { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #444; cursor: pointer; transition: 0.2s; position: relative; }
        .skin-item:hover { transform: scale(1.1); border-color: var(--accent); }
        
        @keyframes rainbow { 
            0% { background: red; } 20% { background: orange; } 40% { background: yellow; } 
            60% { background: green; } 80% { background: blue; } 100% { background: red; } 
        }
        .rainbow-skin { animation: rainbow 2s infinite linear; }

        .price-tag { font-size: 10px; position: absolute; bottom: -20px; width: 100%; left: 0; color: #888; text-transform: uppercase; white-space: nowrap; }

        .bundle-btn { margin-top: 30px; padding: 10px 20px; background: linear-gradient(45deg, #ff0000, #00ffff); border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-family: 'Courier New'; }
        .bundle-btn:disabled { background: #333; cursor: default; opacity: 0.5; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #333; border-radius: 10px; overflow: hidden; text-decoration: none; color: white; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-content { padding: 20px; }
        .card-content h3 { margin: 0; color: var(--accent); text-transform: uppercase; }
        .play-btn { background: #222; padding: 12px; text-align: center; font-weight: bold; border-top: 1px solid #333; color: var(--accent); }

        /* Badge for new games */
        .new-badge { position: absolute; top: 10px; right: 10px; background: var(--sanco-red); color: white; font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .community-sign { margin-top: 50px; padding: 25px; background: #000; border: 2px dashed var(--accent); border-radius: 15px; text-align: center; }
        .community-sign p { margin: 0 0 15px 0; font-weight: bold; line-height: 1.5; color: #fff; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .qr-btn, .share-btn { border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; font-family: 'Courier New'; transition: 0.2s; }
        .qr-btn { background: var(--accent); color: #000; }
        .share-btn { background: #fff; color: #000; }
        
        .high-score-board { margin-top: 20px; color: var(--esofa-gold); font-size: 0.9rem; border-top: 1px solid #333; padding-top: 10px; display: flex; justify-content: space-around; }
    </style>
</head>
<body>

<header>
    <h1>SANCO x ESOFA ARCADE</h1>
    <div class="profile-bar">
        <div class="stat">TAG: <span id="p-name">EXPLORER</span></div>
        <div class="stat">NOTES: <span id="p-notes" style="color:var(--esofa-gold)">0</span> ♪</div>
        <div class="stat">SKIN: <span id="p-skin">DEFAULT</span></div>
    </div>
</header>

<div class="container">
    <div class="shop-box">
        <h3 style="margin:0;">COSMETIC SHOP</h3>
        <div class="skin-list">
            <div class="skin-item" style="background: #3498db;" onclick="handleSkin('Blue', '#3498db', 0)"><span class="price-tag" id="tag-Blue">FREE</span></div>
            <div class="skin-item" style="background: #e74c3c;" onclick="handleSkin('Red', '#e74c3c', 25)"><span class="price-tag" id="tag-Red">25 ♪</span></div>
            <div class="skin-item" style="background: #2ecc71;" onclick="handleSkin('Green', '#2ecc71', 100)"><span class="price-tag" id="tag-Green">100 ♪</span></div>
            <div class="skin-item" style="background: #f1c40f;" onclick="handleSkin('Gold', '#f1c40f', 500)"><span class="price-tag" id="tag-Gold">500 ♪</span></div>
            <div class="skin-item rainbow-skin" onclick="handleSkin('Rainbow', 'rainbow', 750)"><span class="price-tag" id="tag-Rainbow">750 ♪</span></div>
        </div>
        
        <button id="bundle-btn" class="bundle-btn" onclick="buyBundle()">UNLEASH ALL COLORS (1000 ♪)</button>
        
        <p id="shop-msg" style="font-size: 0.8rem; margin-top: 20px;">Use ♪ Notes from Escape or Clicker!</p>

        <div class="high-score-board">
            <div>🏆 BEST ESCAPE: <span id="best-dist">0</span>m</div>
            
        </div>
    </div>
