<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5-D TREASURE HUNT | LEGACY</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.0.0/dist/umd/supabase.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        #setup { position: fixed; inset: 0; background: #000; z-index: 100; text-align: center; padding-top: 50px; }
        .btn { width: 80%; padding: 20px; margin: 10px; border: 2px solid #d4af37; background: #111; color: #d4af37; font-weight: bold; font-size: 16px; border-radius: 10px; }
        #hud { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); z-index: 50; display: none; align-items: center; justify-content: space-around; border-bottom: 1px solid #d4af37; }
        #world { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        .box { position: absolute; width: 80px; height: 80px; background: gold; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 40px; border-radius: 10px; transform: translate(-50%, -50%); }
        .box:after { content: '🎁'; }
        #camera-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #debug { position: fixed; bottom: 0; width: 100%; font-size: 10px; color: #0f0; background: rgba(0,0,0,0.5); text-align: center; z-index: 60; padding: 5px; }
    </style>
</head>
<body>

<video id="camera-bg" autoplay playsinline muted></video>

<div id="setup">
    <h1 style="color:#d4af37">5-D BOOT (LEGACY)</h1>
    <button id="b1" class="btn" onclick="fnCam()">1. CAMERA</button>
    <button id="b2" class="btn" onclick="fnSens()">2. SENSORS</button>
    <button id="bStart" class="btn" style="display:none; border-color:#0f0; color:#0f0;" onclick="fnStart()">3. START</button>
</div>

<div id="hud">
    <div>FOUND: <span id="count" style="color:#0ff">0</span></div>
    <button id="spawn-btn" style="background:#0ff; border:none; padding:10px; font-weight:bold;" onclick="fnSpawn()">+ SPAWN</button>
</div>

<div id="world"></div>
<div id="debug">Awaiting Setup...</div>

<script>
    // Global Error Alert for Old Safari
    window.onerror = function(m, u, l) { alert("Line " + l + ": " + m); };

    var URL = 'https://tyxezjyjwghgajsilsbg.supabase.co';
    var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5eGV6anlqd2doZ2Fqc2lsc2JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyNjczODksImV4cCI6MjA4NDg0MzM4OX0.K1elrtEtbsQPTEQNfweLkh7FXq-Er38Oa5aYtqqV65Q';
    
    var _sb, myLat = 0, myLon = 0, myHdg = 0, treasures = [], active = false;

    function fnCam() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(s) {
            document.getElementById('camera-bg').srcObject = s;
            document.getElementById('b1').style.background = "#030";
            document.getElementById('b1').innerText = "CAM OK";
            fnCheck();
        });
    }

    function fnSens() {
        if (window.DeviceOrientationEvent && DeviceOrientationEvent.requestPermission) {
            DeviceOrientationEvent.requestPermission();
        }
        window.addEventListener('deviceorientation', function(e) {
            myHdg = e.webkitCompassHeading || (360 - e.alpha) || 0;
        }, true);

        navigator.geolocation.watchPosition(function(p) {
            myLat = p.coords.latitude;
            myLon = p.coords.longitude;
            document.getElementById('debug').innerText = "GPS: " + myLat.toFixed(4) + ", " + myLon.toFixed(4);
        }, function(e) { alert("GPS Error: " + e.message); }, { enableHighAccuracy: true });

        document.getElementById('b2').style.background = "#030";
        document.getElementById('b2').innerText = "SENSORS OK";
        fnCheck();
    }

    function fnCheck() {
        if (document.getElementById('b1').innerText === "CAM OK" && document.getElementById('b2').innerText === "SENSORS OK") {
            document.getElementById('bStart').style.display = "block";
        }
    }

    function fnSync() {
        if (!_sb) _sb = supabase.createClient(URL, KEY);
        _sb.from('treasures').select('*').eq('collected', false)
        .then(function(res) {
            if (res.error) return;
            treasures = res.data || [];
            document.getElementById('count').innerText = treasures.length;
            var w = document.getElementById('world');
            w.innerHTML = '';
            for (var i = 0; i < treasures.length; i++) {
                var item = treasures[i];
                var el = document.createElement('div');
                el.className = 'box';
                el.style.left = "-1000px"; // Hide until loop calculates
                el.setAttribute('data-lat', item.lat);
                el.setAttribute('data-lon', item.lon);
                w.appendChild(el);
            }
        });
    }

    function fnSpawn() {
        if (myLat === 0) { alert("Wait for GPS..."); return; }
        alert("TRANSMITTING...");
        _sb.from('treasures').insert([{ lat: myLat, lon: myLon, collected: false }])
        .then(function(res) {
            if (res.error) alert("Error: " + res.error.message);
            else { alert("SUCCESS!"); fnSync(); }
        });
    }

    function fnStart() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        active = true;
        fnSync();
        setInterval(fnSync, 5000);
        fnLoop();
    }

    function fnLoop() {
        if (!active) return;
        var ww = window.innerWidth, wh = window.innerHeight, fov = ww / 60;
        var boxes = document.getElementsByClassName('box');
        for (var i = 0; i < boxes.length; i++) {
            var t = boxes[i];
            var tLat = parseFloat(t.getAttribute('data-lat'));
            var tLon = parseFloat(t.getAttribute('data-lon'));
            
            var dy = Math.sin((tLon-myLon)*Math.PI/180) * Math.cos(tLat*Math.PI/180);
            var dx = Math.cos(myLat*Math.PI/180)*Math.sin(tLat*Math.PI/180) - Math.sin(myLat*Math.PI/180)*Math.cos(tLat*Math.PI/180)*Math.cos((tLon-myLon)*Math.PI/180);
            var bearing = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;

            var diff = bearing - myHdg;
            while (diff < -180) diff += 360;
            while (diff > 180) diff -= 360;

            t.style.left = (ww/2) + (diff * fov) + "px";
            t.style.top = (wh/2) + "px";
            t.style.display = Math.abs(diff) > 40 ? 'none' : 'flex';
        }
        requestAnimationFrame(fnLoop);
    }
</script>
</body>
</html>
